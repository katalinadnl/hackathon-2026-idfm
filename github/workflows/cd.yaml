name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_API: ${{ secrets.DOCKER_HUB_USERNAME }}/pa-api
  IMAGE_WEB: ${{ secrets.DOCKER_HUB_USERNAME }}/pa-web
  IMAGE_NGINX: ${{ secrets.DOCKER_HUB_USERNAME }}/pa-nginx

jobs:
  build-and-push:
    name: Build & Push images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.IMAGE_WEB }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NGINX }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Copy monitoring config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "monitoring/"
          target: /app/

      - name: Copy compose.prod.yaml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: compose.prod.yaml
          target: /app/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}

            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin

            docker pull $DOCKER_HUB_USERNAME/pa-api:latest
            docker pull $DOCKER_HUB_USERNAME/pa-web:latest
            docker pull $DOCKER_HUB_USERNAME/pa-nginx:latest

            DOCKER_HUB_USERNAME=$DOCKER_HUB_USERNAME docker stack deploy \
              --with-registry-auth \
              --compose-file /app/compose.prod.yaml \
              cecoule
