services:

  # ── Reverse proxy Caddy (HTTPS automatique via Let's Encrypt) ─────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    networks:
      - public

  # ── Mailhog (capture emails en démo) ─────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    networks:
      - internal

  # ── API NestJS ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: production
    command: node dist/src/main
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      FC_CLIENT_ID: ${FC_CLIENT_ID}
      FC_CLIENT_SECRET: ${FC_CLIENT_SECRET}
      FC_BASE_URL: ${FC_BASE_URL}
      FC_CALLBACK_URL: https://api.${DOMAIN}/auth/france-connect/callback
      APP_REDIRECT_URL: ${APP_REDIRECT_URL}
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_FROM: noreply@idfm.fr
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - public
      - internal

  # ── Frontend Expo/web ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: production
      args:
        EXPO_PUBLIC_API_URL: https://api.${DOMAIN}/api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - public

  # ── Base de données ───────────────────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    networks:
      - internal

  # ── Analytics (Umami) ─────────────────────────────────────────────────────────
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}_umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - public
      - internal

  # ── CMS (Directus) ───────────────────────────────────────────────────────────
  directus:
    image: directus/directus:11
    restart: unless-stopped
    environment:
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      WEBSOCKETS_ENABLED: "true"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
      PUBLIC_URL: https://cms.${DOMAIN}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    networks:
      - public
      - internal

  # ── Désactiver les services dev-only en prod ──────────────────────────────────
  nginx:
    profiles: ["dev"]
  mailhog:
    profiles: ["dev"]
  adminer:
    profiles: ["dev"]

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  database_data:
  caddy_data:
  caddy_config:
  directus_uploads:
  directus_extensions: